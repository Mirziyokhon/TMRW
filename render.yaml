services:
  - type: web
    name: deadlinebot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python test_render.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SAFE_DAY_BUFFER
        value: "5"
        sync: false
      - key: REMINDER_HOUR
        value: "9"
        sync: false
