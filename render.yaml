services:
  - type: web
    name: deadlinebot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from bot import run_bot; run_bot()"
    envVars:
      - key: SAFE_DAY_BUFFER
        value: "5"
      - key: REMINDER_HOUR
        value: "9"
