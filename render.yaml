services:
  - type: web
    name: deadlinebot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python test_render.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        value: ""  # Set in dashboard
      - key: GROQ_API_KEY
        value: ""  # Set in dashboard
      - key: GEMINI_API_KEY
        value: ""  # Set in dashboard
      - key: SAFE_DAY_BUFFER
        value: "5"
      - key: REMINDER_HOUR
        value: "9"
